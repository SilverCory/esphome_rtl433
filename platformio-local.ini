; platformio-local.ini
;
; PlatformIO project file for building / testing the rtl_433 CC1101 component
; locally without the ESPHome CLI.  This replicates the build flags that the
; ESPHome component (__init__.py) would normally inject.
;
; Prerequisites:
;   1. Clone rtl_433_ESP into this directory:
;        git clone https://github.com/NorthernMan54/rtl_433_ESP.git rtl_433_ESP
;   2. Create a minimal src/main.cpp that includes the component header, e.g.:
;        #include <Arduino.h>
;        #include "components/rtl433/rtl433.h"
;        void setup() {}
;        void loop() {}
;   3. Install PlatformIO (https://platformio.org/)
;   4. Build:
;        pio run -e esp32_cc1101
;
; The rtl_433_ESP library is referenced via a symlink lib_dep so PlatformIO
; uses the local clone rather than fetching from the registry.

[platformio]
default_envs = esp32_cc1101

[env:esp32_cc1101]
platform = espressif32
board = esp32dev
framework = arduino

lib_ldf_mode = chain+

lib_deps =
    symlink://./rtl_433_ESP
    jgromes/RadioLib@^7.2.1

; ---- CC1101 pin mapping (matches example.yaml / VSPI defaults) ----
; Adjust these to match your wiring.
build_flags =
    -DRF_CC1101
    -DRF_MODULE_CS=5
    -DRF_MODULE_GDO0=13
    -DRF_MODULE_GDO2=RADIOLIB_NC   ; Optional: set to a GPIO number if GDO2 is wired
    -DRF_MODULE_SCK=18
    -DRF_MODULE_MISO=19
    -DRF_MODULE_MOSI=23
    -DRF_MODULE_FREQUENCY=433.92
    ; ---- Optional rtl_433_ESP tuning flags (uncomment as needed) ----
    ; -DOOK_MODULATION=false     ; Switch to FSK modulation
    ; -DMY_DEVICES=true          ; Only register devices in your custom list
    ; -DPUBLISH_UNPARSED=true    ; Fire callback for unparsed signals too
    ; -DRTL_DEBUG=4              ; Verbose decoder logging (0-4)
    ; -DMINRSSI=-82              ; Minimum RSSI threshold in dBm

monitor_speed = 115200
